owner: minhh2792
repo: uptime

sites:
  - name: MineVN Network
    check: "tcp-ping"
    url: minevn.net
    maxResponseTime: 5000
    port: 25565
    icon: https://i.imgur.com/OGV4Bar.png
  - name: MineVN Maven & Resource pack
    url: http://app.minevn.net/pack
    maxResponseTime: 5000
    expectedStatusCodes:
      - 200
      - 201
      - 404
    icon: https://i.imgur.com/OGV4Bar.png
  - name: MineVN Website
    url: http://minevn.net
    maxResponseTime: 5000
    expectedStatusCodes:
      - 200
      - 201
      - 404
    icon: https://i.imgur.com/OGV4Bar.png
  - name: Pterodactyl 
    url: $PANEL_URL
    maxResponseTime: 5000
    expectedStatusCodes:
      - 200
    icon: https://i.imgur.com/WYyj7ut.png
 
status-website:
  baseUrl: /uptime
  logoUrl: "https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg"
  favicon: "https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg"
  theme: night
  name: Uptime Monitor
  introTitle: ""
  introMessage: ""
  navbar:
    - title: Status
      href: https://minhh2792.github.io/uptime/
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
