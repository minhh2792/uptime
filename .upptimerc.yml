owner: minhh2792
repo: uptime

sites:
  - name: MineVN Network
    check: "tcp-ping"
    url: minevn.net
    port: 25565
    maxResponseTime: 5000
    icon: https://i.imgur.com/OGV4Bar.png
  - name: MineVN Maven & Resource pack
    url: http://app.minevn.net/pack
    maxResponseTime: 5000
    expectedStatusCodes:
      - 200
      - 201
      - 404
    icon: https://i.imgur.com/OGV4Bar.png
  - name: MineVN Website
    url: http://minevn.net
    maxResponseTime: 5000
    expectedStatusCodes:
      - 200
      - 201
      - 404
    icon: https://i.imgur.com/OGV4Bar.png
  - name: Kiwi AdguardHome server
    check: "tcp-ping"
    url: $SERVER_IP
    port: 53
    maxResponseTime: 5000
    expectedStatusCodes:
      - 200
      - 201
      - 404
    icon: https://i.imgur.com/pRa8pFr.png
  - name: Kiwi Debian server
    url: $SERVER_IP
    maxResponseTime: 5000
    icon: https://i.imgur.com/HDEi4j5.png

